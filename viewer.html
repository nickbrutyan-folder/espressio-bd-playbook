<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Agent Playbook | Espressio AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Creato Display';src:url('fonts/CreatoDisplay-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Creato Display';src:url('fonts/CreatoDisplay-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Creato Display';src:url('fonts/CreatoDisplay-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}
</style>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#FFFBF1;color:#8D5422;font-family:'Creato Display',system-ui,sans-serif}

.toolbar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;
  background:rgba(255,251,241,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid #8D5422;
}
.toolbar-title{
  font-family:'Creato Display',system-ui,sans-serif;font-weight:700;font-size:16px;color:#3B2B22;letter-spacing:-0.02em;
}
.toolbar-sub{
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:#C4A87A;
  letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;
}
.download-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;text-decoration:none;
  border:1px solid #8D5422;background:#8D5422;color:#FFFBF1;
  transition:all 0.25s;
}
.download-btn:hover{background:#3B2B22;border-color:#3B2B22}
.download-btn svg{width:14px;height:14px}

.pdf-container{
  position:fixed;top:64px;left:0;right:0;bottom:0;
}
.pdf-container iframe,.pdf-container embed,.pdf-container object{
  width:100%;height:100%;border:none;
}

/* Fallback if embed fails */
.fallback{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;padding:40px;gap:20px;
}
.fallback p{font-size:15px;color:#B07840;max-width:400px;line-height:1.6}
.fallback .download-btn{font-size:15px;padding:14px 32px}
</style>
</head>
<body>

<div class="toolbar">
  <div>
    <div class="toolbar-title">The BD Agent Playbook</div>
    <div class="toolbar-sub">Espressio AI</div>
  </div>
  <a href="BD_Agent_Playbook_Full.pdf" download class="download-btn">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2v8"/><path d="M4 7l3 3 3-3"/><path d="M2 11h10"/></svg>
    Download PDF
  </a>
</div>

<div class="pdf-container" id="pdfContainer">
  <iframe src="BD_Agent_Playbook_Full.pdf" id="pdfFrame"></iframe>
</div>

<div class="fallback" id="fallback">
  <p>Your browser can't display the PDF inline. Click below to download it directly.</p>
  <a href="BD_Agent_Playbook_Full.pdf" download class="download-btn">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2v8"/><path d="M4 7l3 3 3-3"/><path d="M2 11h10"/></svg>
    Download PDF
  </a>
</div>

<script>
// Fallback if iframe fails to load
const frame = document.getElementById('pdfFrame');
frame.onerror = function() {
  document.getElementById('pdfContainer').style.display = 'none';
  document.getElementById('fallback').style.display = 'flex';
};
</script>
</body>
</html>
